# Builds the Vite app and pushes static files to branch `gh-pages`.
#
# GitHub Pages setup (one time):
#   Repo → Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#   Branch: gh-pages  /  folder: / (root)
#
# Secret: Settings → Secrets → Actions → VITE_API_URL = https://your-api.onrender.com (no trailing slash)
#
# Site URL: https://<user>.github.io/<repo>/  — VITE_BASE_PATH matches the repo name.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          force_orphan: true
