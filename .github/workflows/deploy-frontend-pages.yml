# Builds the Vite app and publishes to GitHub Pages.
#
# Enable: Repo Settings → Pages → Source: "GitHub Actions"
# Secrets (Settings → Secrets → Actions):
#   VITE_API_URL  = your public API URL, e.g. https://your-api.onrender.com (no trailing slash)
#
# Optional variable for GitHub Pages project URL:
#   If your site is https://USER.github.io/REPO/, the workflow sets VITE_BASE_PATH automatically.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          # Point the built SPA at your deployed Express API
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Subpath when using https://<user>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
